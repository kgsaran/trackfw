name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: go test -timeout 2m ./...
        env:
          TRACKFW_DISABLE_EXTERNAL_COMMANDS: "1"
      - run: go vet ./...
      - run: go build ./...
      - run: npm ci --ignore-scripts
        working-directory: npm
      - run: npm test
        working-directory: npm
      - run: python -m pip install build pytest
      - run: python -m pytest pypi/tests -q
      - run: python -m build pypi
      - run: scripts/check-cli-parity.sh
      - run: scripts/check-validate-parity.sh
      - run: scripts/check-static-assets.sh

  release:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  publish-npm:
    needs: [quality, release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Copia README para o pacote npm
        run: cp ../README.md README.md

      - name: Atualiza versão no package.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version

      - name: Publica no npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: [quality, release]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pypi
    environment:
      name: pypi
      url: https://pypi.org/project/trackfw/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instala build
        run: pip install build

      - name: Atualiza versão no pyproject.toml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml

      - name: Copia README para o pacote PyPI
        run: cp ../README.md README.md

      - name: Build do pacote
        run: python -m build

      - name: Publica no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi/dist/
