name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Copia README para o pacote npm
        run: cp ../README.md README.md

      - name: Atualiza versão no package.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version

      - name: Embute binários no pacote
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for TARGET in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64 windows_amd64; do
            OS=$(echo $TARGET | cut -d_ -f1)
            ARCH=$(echo $TARGET | cut -d_ -f2)
            ARCHIVE="trackfw_${VERSION}_${OS}_${ARCH}.tar.gz"
            gh release download "v${VERSION}" --repo kgsaran/trackfw --pattern "$ARCHIVE" --output "bin/$ARCHIVE"
            tar -xzf "bin/$ARCHIVE" -C bin/
            if [ "$OS" = "windows" ]; then
              mv bin/trackfw.exe "bin/trackfw-${OS}-${ARCH}.exe"
            else
              mv bin/trackfw "bin/trackfw-${OS}-${ARCH}"
              chmod +x "bin/trackfw-${OS}-${ARCH}"
            fi
            rm "bin/$ARCHIVE"
          done

      - name: Publica no npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    needs: release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pypi
    environment:
      name: pypi
      url: https://pypi.org/project/trackfw/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instala build
        run: pip install build

      - name: Atualiza versão no pyproject.toml
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version = .*/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/^VERSION = .*/VERSION = \"$VERSION\"/" trackfw/_cli.py

      - name: Copia README para o pacote PyPI
        run: cp ../README.md README.md

      - name: Build do pacote
        run: python -m build

      - name: Publica no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi/dist/
