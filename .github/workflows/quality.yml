name: Quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -timeout 2m ./...
        env:
          TRACKFW_DISABLE_EXTERNAL_COMMANDS: "1"
      - run: go vet ./...
      - run: go build ./...
      - run: scripts/check-static-assets.sh

  node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run smoke
      - run: npm pack --dry-run

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build pytest
      - run: python -m pytest pypi/tests -q
      - run: python -m build pypi
      - run: python -m pip install --force-reinstall pypi/dist/*.whl
      - run: trackfw --version
      - run: |
          tmp_dir=$(mktemp -d)
          cd "$tmp_dir"
          trackfw validate --json

  parity:
    runs-on: ubuntu-latest
    needs: [go, node, python]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci --ignore-scripts
        working-directory: npm
      - run: scripts/check-cli-parity.sh
      - run: scripts/check-validate-parity.sh
      - run: scripts/check-static-assets.sh
        env:
          TRACKFW_DISABLE_EXTERNAL_COMMANDS: "1"
